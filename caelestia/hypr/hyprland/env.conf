$cursorTheme = material_light_cursors
$cursorSize = 24
# ############# Themes #############
env = QT_QPA_PLATFORMTHEME, qtengine
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = XCURSOR_THEME, $cursorTheme
env = XCURSOR_SIZE, $cursorSize

# ######## Toolkit backends ########
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland;xcb
env = SDL_VIDEODRIVER, wayland,x11,windows
env = CLUTTER_BACKEND, wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# ####### XDG specifications #######
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# ############# Others #############
env = _JAVA_AWT_WM_NONREPARENTING, 1
# Базовый Wayland бэкенд для тулкитов
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
# NVIDIA специфичные настройки (Explicit Sync и DRM)
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
# Аппаратное ускорение видео (VA-API) через правильный бэкенд
# Убирает лаги при воспроизведении видео в Chrome
env = NVD_BACKEND,direct
# Фикс мерцания курсора мыши на NVIDIA
env = WLR_NO_HARDWARE_CURSORS,1
# Включение аппаратного ускорения в приложениях на XWayland
env = XWAYLAND_NO_GLAMOR,0
